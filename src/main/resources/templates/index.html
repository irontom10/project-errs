<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Errs</title>
    <script src="/scripts/htmx.min.js"></script>
    <script src="/scripts/htmx-ext-preload@2.1.2.js"></script>
    <script src="/scripts/tailwind.3.4.17.js"></script>
    <script src="http://localhost:35729/livereload.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#FFD700',
                        navy: '#000080',
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: "NerdMono";
            src: url("/fonts/jetbrains/JetBrainsMonoNerdFontMono-Regular.ttf") format("truetype");
        }

        body {
            font-family: "NerdMono", monospace;
        }
    </style>
    <style type="text/tailwindcss">


        @layer base {
            /*--  Main Bodies   --*/
            body {
                font-family: "NerdMono", monospace;
                @apply bg-gray-800 text-gold text-xs mx-auto w-full h-max p-8;
            }
            header {
                @apply bg-navy p-8 sticky top-0 outline outline-1 outline-gold content-center z-50;
            }

            header ul {
                @apply inline-block bg-gray-800;
            }
            header ul li {
                @apply inline-block outline outline-gold outline-2;
            }
            header h1 {
                @apply  text-center p-2;
            }

            main {
                @apply h-max p-2 py-12 bg-gray-700;
            }
            footer{
                @apply p-8;
            }


            /*--  text boxes  --*/
            h1 {
                @apply text-3xl;
            }


            /*--  Inputs  --*/

            select {
                @apply rounded p-2 bg-gray-600; /* may want to define a max width at some point */
            }
            button {
                @apply rounded p-2 bg-gray-800 hover:bg-gray-600 active:bg-gray-300 outline outline-2 outline-gold m-4;
            }


            /*--  Menus  --*/

            menu {
                @apply grid grid-cols-2 content-center justify-items-center;
            }
            menu button {
                @apply w-48;
            }
            menu button:nth-child(odd) {
                @apply justify-self-end;
            }

            menu button:nth-child(even) {
                @apply justify-self-start;
            }

            /*--  Table utils   --*/

            table {
                @apply min-w-full min-h-full bg-gray-800;
            }
            th {
                @apply border hover:bg-gray-700 cursor-pointer relative;
            }
            th span {
                @apply block w-full h-full px-4 py-2;
            }
            th input {
                @apply block w-full h-full px-4 py-2 bg-gray-600;
            }
            th select {
                @apply block w-full h-max p-2 bg-gray-600 rounded-none; /* may want to define a max width at some point */
            }
            th ul {
                @apply absolute bg-gray-600 text-gold shadow-lg overflow-y-auto w-full hidden;
            }
            th:focus-within ul {
                @apply block;
            }
            th ul li:first-child {
                @apply border-t
            }
            th ul li {
                @apply p-2 hover:bg-gray-700 cursor-pointer border border-t-0;
            }
            td {
                @apply border;
            }
            td span {
                @apply block w-full h-full px-4 py-2;
            }
            td input {
                @apply block w-full h-max px-4 py-2 bg-gray-600;
            }
            td select {
                @apply block w-full h-full p-2 bg-gray-600 rounded-none; /* may want to define a max width at some point */
            }
            tbody tr {
                @apply hover:bg-gray-700 cursor-pointer;
            }
        }
    </style>
</head>
<body>
<h1>hello</h1>
</body>
</html>
